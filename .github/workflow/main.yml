name: CI/CD Pipeline

on: [push] # Trigger the pipeline on every push

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install pytest

      - name: Run QA Tests
        run: pytest test_app.py

      - name: Build Docker Image
        run: docker build -t my-qa-app .